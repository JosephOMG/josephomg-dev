<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Joe's Site</title>
  <style>
    :root{
      --bg:#05040a;
      --red:#ff2a2a;
      --text:#f7f7fb;
      --muted:rgba(247,247,251,.72);
      --shadow: 0 22px 70px rgba(0,0,0,.55);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background: radial-gradient(900px 650px at 50% 40%, rgba(255,42,42,.10), transparent 60%),
                  linear-gradient(180deg, #04020a, #060614);
      overflow:hidden;
    }
    canvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:-1;
    }
    .center{
      position:fixed; inset:0;
      display:grid; place-items:center;
      pointer-events:none;
    }
    .card{
      pointer-events:auto;
      text-align:center;
      padding: 26px 26px 22px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      max-width: 560px;
      width: calc(100% - 40px);
      position:relative;
      overflow:hidden;
    }
    .card::before{
      content:"";
      position:absolute; inset:-2px;
      background: radial-gradient(600px 220px at 50% 0%, rgba(255,42,42,.22), transparent 65%);
      opacity:.9;
      pointer-events:none;
    }
    h1{
      margin: 0;
      font-size: clamp(36px, 5vw, 60px);
      letter-spacing: -0.8px;
      position:relative;
      z-index:1;
    }
    h1 span{
      color: var(--red);
      text-shadow: 0 0 18px rgba(255,42,42,.35);
    }
    p{
      margin: 10px 0 0;
      color: var(--muted);
      line-height:1.55;
      position:relative;
      z-index:1;
    }
    .btnrow{
      margin-top:16px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      position:relative;
      z-index:1;
    }
    .btn{
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 14px;
      font-weight: 650;
      cursor:pointer;
      transition: transform .12s ease, background .2s ease;
    }
    .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,.10); }
    .btn.primary{
      border-color: rgba(255,42,42,.25);
      background: linear-gradient(135deg, rgba(255,42,42,.95), rgba(255,110,110,.85));
      color:#140404;
      box-shadow: 0 14px 30px rgba(255,42,42,.16);
    }
    .hint{
      position:fixed;
      left:16px;
      bottom:14px;
      font-size: 12px;
      color: rgba(247,247,251,.55);
      user-select:none;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="center">
    <div class="card">
      <h1>JosephOMG</h1>
      <p>Welcome to my website, enjoy! :p (WORK IN PROGRESS!!!)</p>
      <div class="btnrow">
        <button class="btn primary">Explore</button>
        <button class="btn">About</button>
        <button class="btn">Contact</button>
      </div>
    </div>
  </div>

  <script>
    // ===== Performance-first spiral text background =====
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d", { alpha: false });

    // Cap DPR to reduce GPU/CPU load (big win)
    const DPR_CAP = 1.5;

    function resize(){
      const dpr = Math.min(window.devicePixelRatio || 1, DPR_CAP);
      canvas.width  = Math.floor(innerWidth  * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      canvas.style.width  = innerWidth + "px";
      canvas.style.height = innerHeight + "px";
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    addEventListener("resize", resize);
    resize();

    // Smaller word pool + fewer tokens = smoother
    const words = [
      ":p",":o",":D",":(",":)","xD",
      ":T",":b",":O","o_O",">:D","XD", "O.O", ":]",":0"
    ];

    // Reduce overall draw count (these defaults run much smoother)
    const settings = {
      rings: 18,           // was 34
      tokensPerRing: 12,   // was 22
      baseRadius: 52,
      ringGap: 18,
      spin: 0.28,          // slower (was ~0.50)
      swirl: 1.55,
      wave: 0.55,
      jitter: 0.25
    };

    // Mouse influence (cheap)
    const mouse = { x: 0, y: 0, has:false };
    addEventListener("mousemove", (e)=>{ mouse.x=e.clientX; mouse.y=e.clientY; mouse.has=true; });
    addEventListener("mouseleave", ()=>{ mouse.has=false; });

    const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
    const lerp = (a,b,t)=>a+(b-a)*t;

    // ---- Pre-render each word to an offscreen canvas (big win) ----
    // Drawing bitmaps is much cheaper than fillText hundreds of times.
    const wordSprites = new Map();
    function makeSprite(text, fontPx){
      const key = text + "@" + fontPx;
      if (wordSprites.has(key)) return wordSprites.get(key);

      const oc = document.createElement("canvas");
      const octx = oc.getContext("2d");
      octx.font = `${fontPx}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace`;
      const metrics = octx.measureText(text);
      const pad = 18; // room for glow
      const w = Math.ceil(metrics.width + pad*2);
      const h = Math.ceil(fontPx + pad*2);

      oc.width = w;
      oc.height = h;

      octx.font = octx.font;
      octx.textAlign = "center";
      octx.textBaseline = "middle";

      // subtle glow baked in (lighter, but cheap at runtime)
      octx.fillStyle = "rgba(255,42,42,0.18)";
      octx.shadowColor = "rgba(255,42,42,0.45)";
      octx.shadowBlur = 10;
      octx.fillText(text, w/2, h/2);

      octx.shadowBlur = 0;
      octx.fillStyle = "rgba(255,90,90,1)";
      octx.fillText(text, w/2, h/2);

      const sprite = { canvas: oc, w, h };
      wordSprites.set(key, sprite);
      return sprite;
    }

    // Pre-seed tokens (fewer)
    const tokens = [];
    for(let r=0; r<settings.rings; r++){
      for(let i=0; i<settings.tokensPerRing; i++){
        const w = words[(r*5 + i*3) % words.length];
        tokens.push({
          ring: r,
          i,
          w,
          phase: Math.random()*Math.PI*2,
          wob: 0.7 + Math.random()*0.8,
          // Use only a couple font sizes to limit sprite variety
          fontPx: (r % 3 === 0) ? 16 : (r % 3 === 1) ? 14 : 12
        });
      }
    }

    // Frame throttling (optional): if you still want smoother CPU, set to 50 or 40.
    // 0 = no throttle (uses full refresh rate)
    const FPS_LIMIT = 0;
    let lastFrame = 0;

    function draw(now){
      if (FPS_LIMIT){
        const minDt = 1000 / FPS_LIMIT;
        if (now - lastFrame < minDt){ requestAnimationFrame(draw); return; }
        lastFrame = now;
      }

      const t = now * 0.001;

      const W = innerWidth;
      const H = innerHeight;

      // Background fill (fast, alpha:false)
      ctx.fillStyle = "#05040a";
      ctx.fillRect(0,0,W,H);

      // Center + mouse nudge
      const cx0 = W * 0.5;
      const cy0 = H * 0.46;
      const mx = mouse.has ? (mouse.x - cx0) : 0;
      const my = mouse.has ? (mouse.y - cy0) : 0;
      const cx = cx0 + mx * 0.05;
      const cy = cy0 + my * 0.05;

      // Single radial glow (cheap)
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W,H)*0.6);
      glow.addColorStop(0, "rgba(255,42,42,0.12)");
      glow.addColorStop(0.45, "rgba(255,42,42,0.06)");
      glow.addColorStop(1, "rgba(255,42,42,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0,0,W,H);

      // Draw sprites (no heavy save/restore per token unless we rotate)
      // Rotation is expensive. We approximate “flow” by NOT rotating each word.
      // Still looks spiraly, much smoother.
      const maxR = settings.baseRadius + (settings.rings-1)*settings.ringGap;

      for(const tok of tokens){
        const r = tok.ring;
        const i = tok.i;

        const radius = settings.baseRadius + r * settings.ringGap;
        const ringAngle = r * settings.swirl;

        const around = (i / settings.tokensPerRing) * Math.PI * 2;
        const spin = t * settings.spin;

        const wave1 = Math.sin(t*1.1 + tok.phase + r*0.33 + around*1.2) * settings.wave;
        const wave2 = Math.cos(t*0.85 + tok.phase*0.7 + r*0.21 + around*0.9) * settings.wave;

        const angle = around + ringAngle + spin + wave1*0.42;
        const radDistort = radius * (1 + wave2*0.025);

        let x = cx + Math.cos(angle) * radDistort;
        let y = cy + Math.sin(angle) * radDistort;

        x += Math.sin(t*1.9 + tok.phase) * settings.jitter * tok.wob;
        y += Math.cos(t*1.6 + tok.phase) * settings.jitter * tok.wob;

        // Fade with radius
        const edge = clamp(radius / maxR, 0, 1);
        const a = lerp(0.9, 0.18, edge);

        // Use a couple sprite sizes; scale slightly for depth (cheap)
        const depth = 1 - edge; // 1 near center
        const scale = lerp(0.85, 1.10, depth);

        const sprite = makeSprite(tok.w, tok.fontPx);
        const dw = sprite.w * scale;
        const dh = sprite.h * scale;

        ctx.globalAlpha = a;
        ctx.drawImage(sprite.canvas, x - dw/2, y - dh/2, dw, dh);
      }
      ctx.globalAlpha = 1;

      // Vignette to focus center (single fill)
      const vg = ctx.createRadialGradient(W*0.5, H*0.5, Math.min(W,H)*0.18, W*0.5, H*0.5, Math.min(W,H)*0.78);
      vg.addColorStop(0, "rgba(0,0,0,0)");
      vg.addColorStop(1, "rgba(0,0,0,0.62)");
      ctx.fillStyle = vg;
      ctx.fillRect(0,0,W,H);

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  </script>
</body>
</html>
